# n8n-node-mocker configuration
# Copy this file to config.yaml and adjust as needed.

port: 9090
fixturesDir: ./fixtures
caDir: ~/.n8n-node-mocker

# Per-service signing secrets.
# These must match the secrets configured in n8n credentials
# for signature verification to pass.
services:
  linear:
    signingSecret: "test-secret-linear"
  typeform:
    signingSecret: "test-secret-typeform"
  figma:
    signingSecret: "test-secret-figma"
  gitlab:
    signingSecret: "test-secret-gitlab"
  trello:
