# n8n-node-mocker configuration
# Copy this file to config.yaml and adjust as needed.

port: 9090
fixturesDir: ./fixtures
caDir: ~/.n8n-node-mocker

# What to do when no fixture matches a request in mock mode:
#   auto  - return smart defaults (200 OK with empty JSON) so n8n keeps working
#   error - return 501 (original behavior, useful for strict testing)
fallbackMode: auto

# Per-service signing secrets.
# These must match the secrets configured in n8n credentials
# for signature verification to pass.
# Default: "test" for all services -- just type "test" in n8n's
# signing secret field and it works.
services:
  linear:
    signingSecret: "test"
  typeform:
    signingSecret: "test"
  figma:
    signingSecret: "test"
  gitlab:
    signingSecret: "test"
  trello:
    signingSecret: "test"
  twilio:
    signingSecret: "test"
  asana:
    signingSecret: "test"
  netlify:
    signingSecret: "test"
  acuityscheduling:
    signingSecret: "test"
  awssns:
    signingSecret: "test"
  box:
    signingSecret: "test"
  cal:
    signingSecret: "test"
  calendly:
    signingSecret: "test"
  customerio:
    signingSecret: "test"
  formstack:
    signingSecret: "test"
  mailerlite:
